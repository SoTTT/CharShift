name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 0.1.0)"
        required: true
        default: "0.1.0"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ========================================
  # Windows 构建
  # ========================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build (No WebView2)
        run: cargo tauri build

      - name: Build (WebView2 Bootstrapper)
        run: cargo tauri build --config ./build-scripts/config/webview2-embed.json

      - name: Build (WebView2 Offline)
        run: cargo tauri build --config ./build-scripts/config/webview2-offline.json

      - name: Collect artifacts
        run: |
          mkdir -p dist/windows
          copy target/release/code-convertor.exe dist/windows/code-convertor-x64.exe
          copy target/release/bundle/nsis/*.exe dist/windows/
        shell: pwsh

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: dist/windows/*

  # ========================================
  # Linux 构建
  # ========================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build Linux packages
        run: cargo tauri build --config ./build-scripts/config/linux.json

      - name: Collect artifacts
        run: |
          mkdir -p dist/linux
          cp target/release/bundle/deb/*.deb dist/linux/ || true
          cp target/release/bundle/appimage/*.AppImage dist/linux/ || true

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: dist/linux/*

  # ========================================
  # macOS 构建
  # ========================================
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-action@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build macOS packages
        run: cargo tauri build --config ./build-scripts/config/macos.json

      - name: Collect artifacts
        run: |
          mkdir -p dist/macos
          cp target/release/bundle/dmg/*.dmg dist/macos/ || true
          cp -r target/release/bundle/macos/*.app dist/macos/ || true

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: dist/macos/*

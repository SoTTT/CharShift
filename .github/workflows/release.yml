name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 0.1.0)"
        required: true
        default: "0.1.0"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ========================================
  # Windows 构建
  # ========================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build (No WebView2)
        run: cargo tauri build

      - name: Build (WebView2 Bootstrapper)
        run: cargo tauri build --config ./build-scripts/config/webview2-embed.json

      - name: Build (WebView2 Offline)
        run: cargo tauri build --config ./build-scripts/config/webview2-offline.json

      - name: Collect artifacts
        run: |
          mkdir -p dist/windows
          copy target/release/charshift.exe dist/windows/charshift-x64.exe
          copy target/release/bundle/nsis/*.exe dist/windows/
        shell: pwsh

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: dist/windows/*

  # ========================================
  # Linux 构建
  # ========================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build Linux packages
        run: cargo tauri build --config ./build-scripts/config/linux.json

      - name: Collect artifacts
        run: |
          mkdir -p dist/linux
          cp target/release/bundle/deb/*.deb dist/linux/ || true
          cp target/release/bundle/appimage/*.AppImage dist/linux/ || true

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: dist/linux/*

  # ========================================
  # macOS 构建
  # ========================================
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate macOS icon
        run: |
          python3 -c "
          import struct, zlib
          w, h = 512, 512
          png = b'\x89PNG\r\n\x1a\n'
          ihdr = struct.pack('>IIBBBBB', w, h, 8, 6, 0, 0, 0)
          crc = zlib.crc32(b'IHDR' + ihdr) & 0xffffffff
          png += struct.pack('>I', len(ihdr)) + b'IHDR' + ihdr + struct.pack('>I', crc)
          raw = b''
          for y in range(h):
              raw += b'\x00'
              for x in range(w):
                  raw += bytes([255, 132, 0, 255])
          comp = zlib.compress(raw)
          crc = zlib.crc32(b'IDAT' + comp) & 0xffffffff
          png += struct.pack('>I', len(comp)) + b'IDAT' + comp + struct.pack('>I', crc)
          crc = zlib.crc32(b'IEND') & 0xffffffff
          png += struct.pack('>I', 0) + b'IEND' + struct.pack('>I', crc)
          open('icons/icon_512.png', 'wb').write(png)
          "
          mkdir icon.iconset
          sips -z 16 16 icons/icon_512.png --out icon.iconset/icon_16x16.png
          sips -z 32 32 icons/icon_512.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32 icons/icon_512.png --out icon.iconset/icon_32x32.png
          sips -z 64 64 icons/icon_512.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128 icons/icon_512.png --out icon.iconset/icon_128x128.png
          sips -z 256 256 icons/icon_512.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256 icons/icon_512.png --out icon.iconset/icon_256x256.png
          sips -z 512 512 icons/icon_512.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512 icons/icon_512.png --out icon.iconset/icon_512x512.png
          iconutil -c icns icon.iconset -o icons/icon.icns
          rm -rf icon.iconset icons/icon_512.png

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Build macOS packages
        run: cargo tauri build --config ./build-scripts/config/macos.json --config '{"bundle":{"icon":["icons/icon.ico","icons/icon.png","icons/icon.icns"]}}'

      - name: Collect artifacts
        run: |
          mkdir -p dist/macos
          cp target/release/bundle/dmg/*.dmg dist/macos/ || true
          cp -r target/release/bundle/macos/*.app dist/macos/ || true

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: dist/macos/*

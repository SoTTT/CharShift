<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CharShift</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Title Bar -->
    <header class="title-bar">
      <div class="app-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="24" height="24" rx="4" fill="#FF8400"/>
          <path d="M7 15L12 9L17 15" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 9V21" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <path d="M9 12H15" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="title-text">CharShift</span>
      <div class="spacer"></div>
      <button id="btn-settings" class="title-bar-settings-btn" title="设置">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- Toolbar -->
    <div class="toolbar">
      <button id="btn-open" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        打开目录
      </button>
      <button id="btn-clear" class="btn btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
        清空
      </button>
      <button id="btn-expand-all" class="btn btn-secondary" title="展开全部目录">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
        展开
      </button>
      <button id="btn-collapse-all" class="btn btn-secondary" title="收起全部目录">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="18 15 12 9 6 15"/>
        </svg>
        收起
      </button>
      <div class="spacer"></div>
      <label class="encoding-label">目标编码：</label>
      <div class="encoding-select-wrapper">
        <div class="encoding-select-display" id="encoding-trigger">
          <span id="encoding-value">UTF-8</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
        <div class="encoding-dropdown hidden" id="encoding-dropdown">
          <div class="encoding-option selected" data-value="UTF-8">UTF-8</div>
          <div class="encoding-option" data-value="GBK">GBK</div>
          <div class="encoding-option" data-value="GB2312">GB2312</div>
          <div class="encoding-option" data-value="GB18030">GB18030</div>
          <div class="encoding-option" data-value="BIG5">BIG5</div>
          <div class="encoding-option" data-value="SHIFT_JIS">SHIFT_JIS</div>
          <div class="encoding-option" data-value="EUC-JP">EUC-JP</div>
          <div class="encoding-option" data-value="EUC-KR">EUC-KR</div>
          <div class="encoding-option" data-value="ISO-8859-1">ISO-8859-1</div>
          <div class="encoding-option" data-value="WINDOWS-1252">WINDOWS-1252</div>
        </div>
      </div>
      <button id="btn-convert" class="btn btn-primary" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        开始转换
      </button>
    </div>

    <!-- File Tree Card -->
    <div class="file-card">
      <div class="card-header">
        <span class="card-title">文件列表</span>
        <span id="selection-count" class="selection-count">已选择 0/0</span>
      </div>
      <div class="card-divider"></div>
      <div id="file-tree" class="file-tree">
        <!-- Drop overlay -->
        <div id="drop-overlay" class="drop-overlay hidden">
          <div class="drop-zone">
            <div class="drop-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FF8400" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="12" y1="18" x2="12" y2="12"/>
                <line x1="9" y1="15" x2="15" y2="15"/>
              </svg>
            </div>
            <div class="drop-title">释放以添加文本文件</div>
            <div class="drop-subtitle">或将文件直接拖入此区域</div>
          </div>
        </div>
        <!-- Empty state -->
        <div id="empty-state" class="empty-state">
          <div class="empty-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#CBCCC9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
          </div>
          <div class="empty-title">暂无文件</div>
          <div class="empty-desc">点击「打开目录」开始扫描</div>
          <div class="empty-drag-hint">或将文本文件直接拖入此处</div>
        </div>
      </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
      <div class="status-left">
        <span id="status-dot" class="status-dot idle"></span>
        <span id="status-text" class="status-text">就绪</span>
      </div>
      <span id="node-count" class="node-count">共 0 个节点</span>
    </div>
  </div>

  <!-- Overlay -->
  <div id="overlay" class="overlay hidden"></div>

  <!-- Dialog -->
  <div id="dialog" class="dialog hidden">
    <div id="dialog-icon" class="dialog-icon"></div>
    <div id="dialog-title" class="dialog-title"></div>
    <div id="dialog-body" class="dialog-body"></div>
    <button id="dialog-btn" class="dialog-btn">确定</button>
  </div>

  <!-- Settings Dialog -->
  <div id="settings-dialog" class="dialog hidden">
    <div class="dialog-title" style="margin-bottom: 4px;">设置</div>
    <div class="settings-body">
      <div class="setting-item">
        <div class="setting-info">
          <div class="setting-label">扫描时排除非文本文件</div>
          <div class="setting-desc">开启后，扫描目录将自动跳过二进制文件，仅保留文本文件</div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="setting-exclude-binary">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="setting-item">
        <div class="setting-info">
          <div class="setting-label">锁定列表中的文件</div>
          <div class="setting-desc">开启后，添加到列表的文件将被独占锁定，阻止其他程序修改（程序关闭后自动解除）</div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="setting-lock-files">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>
    <div class="settings-footer">
      <button id="settings-close-btn" class="dialog-btn">确定</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
